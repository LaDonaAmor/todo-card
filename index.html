<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todo-card</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <main>
        <article class="card-container" data-testid="test-todo-card">
            <header class="card-header">
                <div class="task-header">

                    <input type="checkbox" class="task-complete" data-testid="test-todo-complete-toggle"
                        aria-labelledby="task-title" />
                    <h2 id="task-title" class="title" data-testid="test-todo-title">
                        Finish Frontend Task
                    </h2>

                </div>
            </header>

            <p class="description" data-testid="test-todo-description">
                Ensure stage 0 task is completed following given instructions strictly.
            </p>

            <div class="info-section">
                <span class="priority high" data-testid="test-todo-priority" aria-label="High priority task">
                    High
                </span>

                <span class="status pending" data-testid="test-todo-status" aria-label="Pending">
                    Pending
                </span>
            </div>

            <div class="date-section">
                <span> Due:
                    <time datetime="2026-04-15T18:00" data-testid="test-todo-due-date">
                        Apr 15, 2026
                    </time>
                </span>

                <span class="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite">
                    Due in 3 days
                </span>
            </div>

            <ul class="tag-container" role="list" data-testid="test-todo-tags">
                <li class="tag tag-work" data-testid="test-todo-tag-work">Work</li>
                <li class="tag tag-urgent" data-testid="test-todo-tag-urgent">Urgent</li>
                <li class="tag tag-design" data-testid="test-todo-tag-design">Design</li>

            </ul>

            <div class="action-section">
                <button type="button" data-testid="test-todo-edit-button" aria-label="Edit Task">
                    Edit
                </button>
                <button type="button" data-testid="test-todo-delete-button" aria-label="Delete Task">
                    Delete
                </button>
            </div>

        </article>
    </main>

</body>

</html>
